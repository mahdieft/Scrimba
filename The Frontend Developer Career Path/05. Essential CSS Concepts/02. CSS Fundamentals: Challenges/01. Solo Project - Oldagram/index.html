<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oldagram</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <img class="header-logo" src="images/logo.png" alt="logo">
            <img class="avatar header-avatar" src="images/user-avatar.png" alt="user's avatar">
        </header>
        <main>
            <section>
                <div class="post-header-container">
                    <img class="avatar post-avatar" src="images/avatar-vangogh.jpg" alt="Vangogh's avatar">
                    <div>
                        <h1 class="post-h1">Vincent van Gogh</h1>
                        <p class="post-p">Zudert, Netherlands</p>
                    </div>
                </div>
                <img class="post-image" src="images/post-vangogh.jpg" alt="Vangogh">
                <div class="post-icon-container">
                    <img class="icon" src="images/icon-heart.png" alt="heart icon">
                    <img class="icon" src="images/icon-comment.png" alt="comment icon">
                    <img class="icon" src="images/icon-dm.png" alt="dm icon">
                </div>
                <p class="post-like-count">21,492 likes</p>
                <div class="post-comment-container">
                    <h2 class="post-comment-h2">vincey1853</h2>
                    <p class="post-comment-p">just took a few mushrooms lol</p>
                </div>
            </section>
        </main>
    </div>
    <script src="index.js"></script>
</body>
</html>
