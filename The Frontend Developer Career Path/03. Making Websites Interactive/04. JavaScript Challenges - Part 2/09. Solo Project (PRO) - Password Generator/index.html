<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
</head>
<body>
    <div id="container">
        <h1>Generate a<br><span id="header-fancy">random password</span></h1>
        <p id="punchline">Never use an insecure password again.</p>
        <div id="container-form">
            <div class="container-form-element">
                <label for="length">Length:</label>
                <input type="number" id="length" min="6" max="12" value="12"><span id="min-max">(6 - 20)</span>
            </div>
            <div class="container-form-element">
                <input type="checkbox" id="symbol" checked>
                <label for="symbol">Use Symbol:</label>
            </div>
            <div class="container-form-element">
                <input type="checkbox" id="digit" checked>
                <label for="digit">Use Digit:</label>
            </div>
            <button id="generate">Generate Password</button>
        </div>

        <hr>

        <div class="container-password">
            <p class="password" id="password_1">Password 1</p>
            <p class="password" id="password_2">Password 2</p>
        </div>
    </div>
</body>
</html>
