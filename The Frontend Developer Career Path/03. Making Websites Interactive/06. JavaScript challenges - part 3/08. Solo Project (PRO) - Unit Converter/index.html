<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solo Project (PRO) - Unit Converter</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
          rel="stylesheet">
</head>
<body>
    <div id="container">
        <div id="container-form">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input type="text" id="input" placeholder="20">
            <button id="convert">Convert</button>
        </div>
        <div id="container-result">
            <div class="result">
                <p class="result-title">Length (Meter/Feet)</p>
                <p class="result-conversion"></p>
            </div>
            <div class="result">
                <p class="result-title">Volume (Liters/Gallons)</p>
                <p class="result-conversion"></p>
            </div>
            <div class="result">
                <p class="result-title">Mass (Kilograms/Pounds)</p>
                <p class="result-conversion"></p>
            </div>
        </div>
    </div>
</body>
</html>
