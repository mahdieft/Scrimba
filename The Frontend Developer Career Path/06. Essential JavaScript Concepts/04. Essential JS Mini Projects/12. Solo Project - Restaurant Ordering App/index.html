<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Ordering App</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
     <header>
         <div class="container">
             <h1>Jimmy’s Diner</h1>
             <p>The best burgers and pizzas in town.</p>
         </div>
     </header>
    <main>
        <div class="container">
            <section class="menu-item">
                <p class="menu-item-image">🍕</p>
                <div class="menu-item-details">
                    <h2 class="menu-item-title">Pizza</h2>
                    <p class="menu-item-description">pepperoni, mushroom, mozzarella</p>
                    <p class="menu-item-price">$14</p>
                </div>
                <p class="menu-item-add">+</p>
            </section>
            <section class="menu-item">
                <p class="menu-item-image">🍔</p>
                <div class="menu-item-details">
                    <h2 class="menu-item-title">Hamburger</h2>
                    <p class="menu-item-description">beef, cheese, lettuce</p>
                    <p class="menu-item-price">$12</p>
                </div>
                <p class="menu-item-add">+</p>
            </section>
            <section class="menu-item">
                <p class="menu-item-image">🍺</p>
                <div class="menu-item-details">
                    <h2 class="menu-item-title">Beer</h2>
                    <p class="menu-item-description">grain, hops, yeast, water</p>
                    <p class="menu-item-price">$12</p>
                </div>
                <p class="menu-item-add">+</p>
            </section>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
